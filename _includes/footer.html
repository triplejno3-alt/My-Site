<footer class="modern-footer">
  <div class="footer-container">
    <div class="footer-info">
      <h3 class="footer-title">{{ site.title | escape }}</h3>
      {% include cobe.html %}
      <p class="footer-desc" style="margin-top: 1.5rem;">{{ site.description | escape }}</p>
    </div>
    
    <div class="footer-links-group">
      <div class="footer-contact">
        <h4>联系我</h4>
        {%- if site.email -%}
        <a href="mailto:{{ site.email }}">Email Me</a>
        {%- endif -%}
      </div>
      
      <div class="footer-social">
        <h4>关注我</h4>
        <div class="social-icons">
          {%- include social.html -%}
        </div>
      </div>
    </div>
  </div>
  
  <div class="footer-bottom">
    <p>&copy; {{ "now" | date: "%Y" }} {{ site.title | escape }}. Built with ❤️ using Jekyll.</p>
  </div>
</footer>

<style>
  .modern-footer {
    background: #1a1a2e; /* 深蓝背景 */
    color: #eeeeee;
    padding: 4rem 0 2rem 0;
    margin-top: 5rem;
    border-top: 1px solid #eeeeee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .footer-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 3rem;
  }

  .footer-info {
    flex: 1;
    min-width: 300px;
  }

  .footer-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: #ffffff;
  }

  .footer-desc {
    color: #aaaaaa;
    line-height: 1.6;
    max-width: 400px;
    font-style: italic;
  }

  .footer-links-group {
    display: flex;
    gap: 4rem;
    flex-wrap: wrap;
  }

  .modern-footer h4 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1.2rem;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .footer-contact a {
    color: #007bff;
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-contact a:hover {
    color: #0056b3;
    text-decoration: underline;
  }

  .footer-bottom {
    max-width: 1400px;
    margin: 3rem auto 0 auto;
    padding: 2rem 2rem 0 2rem;
    border-top: 1px solid #eeeeee;
    text-align: center;
    color: #999999;
    font-size: 0.9rem;
  }

  @media (max-width: 768px) {
    .footer-container {
      flex-direction: column;
      text-align: center;
    }
    .footer-desc {
      margin: 0 auto;
    }
    .footer-links-group {
      justify-content: center;
      gap: 2rem;
    }
  }
</style>
