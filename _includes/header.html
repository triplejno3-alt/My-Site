<header class="modern-header">
  <div class="header-container">
    <div class="header-left">
      <a class="header-logo" href="{{ "/" | relative_url }}">
        <span class="logo-text">{{ site.title | escape }}</span>
      </a>
    </div>
    
    <nav class="header-right">
      <ul class="nav-links">
        <li><a href="{{ "/" | relative_url }}">Resume</a></li>
        {%- for page in site.pages -%}
          {%- if page.title -%}
          <li><a href="{{ page.url | relative_url }}">{{ page.title | escape }}</a></li>
          {%- endif -%}
        {%- endfor -%}
      </ul>
    </nav>
  </div>
</header>

<style>
  .modern-header {
    background: #ffffff;
    color: #2c3e50;
    padding: 0.75rem 0;
    border-bottom: 1px solid #ecf0f1;
    position: sticky;
    top: 0;
    z-index: 1000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .header-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-logo {
    text-decoration: none;
    color: #ffffff;
    display: flex;
    align-items: center;
  }

  .logo-text {
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #2c3e50;
    background: none;
    -webkit-text-fill-color: initial;
  }

  .nav-links {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    gap: 2rem;
  }

  .nav-links a {
    text-decoration: none;
    color: #7f8c8d;
    font-size: 0.9rem;
    font-weight: 600;
    transition: color 0.3s;
    text-transform: uppercase;
  }

  .nav-links a:hover {
    color: #3498db;
  }

  @media (max-width: 768px) {
    .header-container {
      flex-direction: column;
      gap: 1rem;
    }
    .nav-links {
      gap: 1rem;
      font-size: 0.85rem;
    }
  }
</style>
