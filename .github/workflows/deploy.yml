name: Deploy to AWS EC2

on:
  push:
    branches: [ main, master ]  # 根据您的默认分支调整

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    # 如果您的项目需要构建（例如React/Vue/Node.js），取消下面的注释
    # - name: Setup Node.js
    #   uses: actions/setup-node@v4
    #   with:
    #     node-version: '18'
    #     
    # - name: Install dependencies
    #   run: npm ci
    #   
    # - name: Build project
    #   run: npm run build
    
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          set -e
          
          echo "🚀 开始部署流程..."
          
          # 配置 Git
          git config --global --add safe.directory /home/ubuntu/My-Site
          
          # 进入网站目录
          cd /home/ubuntu/My-Site || exit 1
          
          echo "📥 拉取最新代码..."
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          
          echo "📦 安装项目依赖..."
          bundle config set --local path 'vendor/bundle'
          bundle install
          
          echo "🧹 清理旧的构建产物..."
          sudo rm -rf /home/ubuntu/My-Site/_site
          
          echo "🔨 构建静态网站..."
          bundle exec jekyll build
          
          echo "🔧 设置文件权限..."
          sudo chown -R www-data:www-data /home/ubuntu/My-Site/_site
          sudo chmod -R 755 /home/ubuntu/My-Site/_site
          
          # 输出部署时间
          echo "✅ Deployment completed successfully at $(date)"
